site_name: DiversityLens
theme:
  name: material
  features:
    - navigation.tabs
    - search.suggest
  custom_dir: docs/overrides

extra:
  version:
    provider: mike

docs_dir: docs
plugins:
  - search
  - mike:
      version_selector: true
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            docstring_style: google
            show_root_heading: true
nav:
  - Home: index.md
  - API: API.md
  - About: about.md
  - License: license.md
