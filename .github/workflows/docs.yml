name: Publish Documentation

on:
  push:
    branches:
      - main
      - feature_publish-mkdocs

permissions:
  contents: write
jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git author
        run:
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com" # DÜZELTME 2: Sondaki o garip noktayı sildim.

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11 

      - name: Install system dependencies for dlib. #dependencies for c++ library
        run:
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          
      - name: Install dependencies
        run: 
          pip install -r requirements.txt 

      - name: Install project
        run:
          echo "Cleaning up build artifacts..."
          find . -name "*.egg-info" -type d -exec rm -rf {} +
          echo "Installing project in editable mode..."
          pip install -e .

      - name: Deploy documentation with mike
        run: 
              export PATH="$HOME/.local/bin:$PATH"
              if [ "${{ github.ref_name }}" = "main" ]; then
                echo "Deploying 'main' branch as 'latest'..."
                mike deploy --push latest
              else
                echo "Deploying branch ${{ github.ref_name }} as ${{ github.ref_name }}..."
                mike deploy --push "${{ github.ref_name }}"
              fi