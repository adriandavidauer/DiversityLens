name: Publish Documentation

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies for dlib
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_doc.txt

      - name: Expose src on PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$PYTHONPATH" >> $GITHUB_ENV

      - name: Deploy documentation with mike
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "Deploying tag as version ${VERSION}..."
            mike deploy --push "${VERSION}" latest --update-aliases
            mike set-default --push latest
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "Deploying develop as dev..."
            mike deploy --push dev latest --update-aliases
            mike set-default --push latest
          else
            echo "Deploying main as stable..."
            mike deploy --push stable
          fi
